spring.application.name=rejunk-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://${DB_HOST:${HOST:db}}:${DB_PORT:5432}/${DB_NAME:rejunk}
spring.datasource.username=${DB_USER:rejunk}
spring.datasource.password=${DB_PASS:rejunk}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true